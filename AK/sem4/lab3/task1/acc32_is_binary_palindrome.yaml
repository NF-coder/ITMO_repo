limit: 1000
memory_size: 2048

memory_mapped_io:
  0x80: [5]
  0x84: []

reports:
  - name: Execution trace
    slice: all
    view: |
      PC={pc:hex} | ACC={Acc:hex} | V={V} C={C} | {instruction}

  - name: Final state
    slice: last
    view: |
      Result (memory[0x84]): {memory:0x84:0x84}

  - name: Result verification
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [0]