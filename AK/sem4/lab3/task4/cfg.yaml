limit: 18000
memory_size: 0x1000
memory_mapped_io:
  0x80: [12343]
  0x84: []
reports:
  - name: Execution trace
    slice: all
    view: |
      T0: {T0:hex} | T1: {T1:hex} | T2: {T2:hex} | T3: {T3:hex}
      ---
      {pc}:{pc:label}:{instruction}
  - name: Check results
    slice: last
    filter:
      - state
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [1]
